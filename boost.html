<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鼓勵 Ashley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/boost.css">
</head>
<body>

  <section class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1 class="login-logo">ASHLEY</h1>
      <p class="login-sub">鼓勵後台</p>
      <form id="loginForm" novalidate>
        <input type="email" id="loginEmail" placeholder="電子郵件" autocomplete="email" required>
        <input type="password" id="loginPassword" placeholder="密碼" autocomplete="current-password" required>
        <button type="submit">登入</button>
        <p class="login-error hidden" id="loginError">帳號或密碼錯誤，請重試。</p>
      </form>
    </div>
  </section>

  <section class="admin-screen hidden" id="adminScreen">
    <header class="admin-header">
      <span class="admin-logo">鼓勵 Ashley ✦</span>
      <div class="admin-header-right">
        <a href="admin.html" class="btn-outline">上傳後台</a>
        <a href="index.html" target="_blank" class="btn-outline">前往網站</a>
        <button id="logoutBtn" class="btn-outline danger">登出</button>
      </div>
    </header>
    <main class="boost-main">
      <p class="boost-hint">每次點擊 ＋50 讚 · ＋100 瀏覽</p>
      <div class="boost-list" id="boostList">
        <p class="manage-empty">載入中…</p>
      </div>
    </main>
  </section>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/boost.js"></script>
</body>
</html>
