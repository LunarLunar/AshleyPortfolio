<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASHLEY — 創作集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">ASHLEY</a>
      <p class="site-tagline">創作 · 想像 · 記錄</p>
    </div>
  </header>

  <main class="gallery-grid" id="galleryGrid">
    <div class="gallery-empty" id="galleryEmpty">
      <p>作品陸續更新中…</p>
    </div>
  </main>

  <!-- 燈箱 Lightbox -->
  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog">
    <div class="lightbox-overlay" id="lightboxOverlay"></div>
    <div class="lightbox-panel">
      <button class="lightbox-close" id="lightboxClose" aria-label="關閉">&#10005;</button>

      <div class="lightbox-media-wrap" id="lightboxMediaWrap">
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
        <video class="lightbox-video hidden" id="lightboxVideo" controls playsinline></video>
      </div>

      <div class="lightbox-info">
        <h2 class="lightbox-title" id="lightboxTitle"></h2>
        <blockquote class="lightbox-quote" id="lightboxQuote"></blockquote>
        <p class="lightbox-concept" id="lightboxConcept"></p>

        <div class="lightbox-meta">
          <button class="like-btn" id="likeBtn" aria-label="按讚">
            <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="like-count" id="likeCount">0</span>
          </button>
          <div class="view-count">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <span id="viewCount">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/gallery.js"></script>
</body>
</html>
