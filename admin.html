<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台上傳 — ASHLEY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- 登入頁 -->
  <section class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1 class="login-logo">ASHLEY</h1>
      <p class="login-sub">後台管理</p>
      <form id="loginForm" novalidate>
        <input type="email" id="loginEmail" placeholder="電子郵件" autocomplete="email" required>
        <input type="password" id="loginPassword" placeholder="密碼" autocomplete="current-password" required>
        <button type="submit" id="loginBtn">登入</button>
        <p class="login-error hidden" id="loginError">帳號或密碼錯誤，請重試。</p>
      </form>
    </div>
  </section>

  <!-- 後台主介面 -->
  <section class="admin-screen hidden" id="adminScreen">
    <header class="admin-header">
      <span class="admin-logo">ASHLEY 後台</span>
      <div class="admin-header-right">
        <a href="index.html" target="_blank" class="btn-outline">前往網站</a>
        <button id="logoutBtn" class="btn-outline danger">登出</button>
      </div>
    </header>

    <main class="admin-main">

      <!-- 上傳表單 -->
      <section class="upload-section">
        <h2>上傳新作品</h2>
        <form id="uploadForm" novalidate>

          <div class="form-row">
            <label>拖曳或選取檔案 <span class="req">*</span></label>
            <div class="file-drop-zone" id="dropZone">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <p>拖曳檔案到這裡，或 <span class="click-text">點擊選取</span></p>
              <p class="file-hint">支援 JPG / PNG / WEBP / MP4（最大 100MB）</p>
              <input type="file" id="artFile" accept="image/*,video/mp4" class="hidden-file-input" required>
            </div>
            <div class="file-preview-wrap hidden" id="filePreviewWrap">
              <img id="filePreviewImg" class="file-preview-img hidden" src="" alt="預覽">
              <video id="filePreviewVideo" class="file-preview-img hidden" controls></video>
              <p id="filePreviewName" class="file-preview-name"></p>
              <button type="button" id="clearFileBtn" class="btn-clear">移除檔案</button>
            </div>
          </div>

          <div class="form-row">
            <label>類型
              <span class="hint" id="typeHint">（自動偵測中）</span>
            </label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="artType" value="image" checked> 圖片</label>
              <label class="radio-label"><input type="radio" name="artType" value="video"> 影片</label>
            </div>
          </div>

          <div class="form-row">
            <label>作品名稱 <span class="req">*</span></label>
            <input type="text" id="artTitle" placeholder="例：夜晚的街角" required>
          </div>

          <div class="form-row">
            <label>Ashley 的話 <span class="req">*</span>
              <span class="hint">（顯示在燈箱內的引言）</span>
            </label>
            <textarea id="artQuote" rows="3" placeholder="寫下你對這幅作品的感受…" required></textarea>
          </div>

          <div class="form-row">
            <label>概念說明
              <span class="hint">（創作背後的想法，可選填）</span>
            </label>
            <textarea id="artConcept" rows="4" placeholder="這件作品的靈感來自…"></textarea>
          </div>

          <div class="upload-progress hidden" id="uploadProgress">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="progressText">上傳中… 0%</p>
          </div>

          <button type="submit" id="submitBtn" class="btn-upload">上傳作品</button>
          <p class="upload-msg hidden" id="uploadMsg"></p>
        </form>
      </section>

      <!-- 作品管理列表 -->
      <section class="manage-section">
        <h2>管理現有作品</h2>
        <p class="manage-hint">鼓勵功能請前往 <a href="boost.html">鼓勵後台</a></p>
        <div class="manage-list" id="manageList">
          <p class="manage-empty">載入中…</p>
        </div>
      </section>

    </main>
  </section>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
