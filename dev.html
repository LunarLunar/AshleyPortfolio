<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[DEV] ASHLEY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dev-tag {
      position: fixed;
      bottom: 14px;
      right: 14px;
      background: #e44;
      color: #fff;
      font-size: 11px;
      font-family: monospace;
      padding: 3px 10px;
      border-radius: 4px;
      z-index: 9999;
      letter-spacing: 0.1em;
      pointer-events: none;
    }
    .pick-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 73px);
      gap: 16px;
    }
    .pick-screen p {
      color: #666;
      font-size: 13px;
      letter-spacing: 0.08em;
    }
    .btn-pick {
      background: transparent;
      border: 1px solid #c9a96e;
      color: #c9a96e;
      padding: 12px 32px;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.2s, color 0.2s;
    }
    .btn-pick:hover { background: #c9a96e; color: #0a0a0a; }
    .btn-repick {
      position: fixed;
      top: 80px;
      right: 16px;
      z-index: 200;
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-repick:hover { border-color: #c9a96e; color: #c9a96e; }
  </style>
</head>
<body>

  <div class="dev-tag">DEV</div>

  <header class="site-header">
    <div class="header-inner">
      <a href="dev.html" class="site-logo">ASHLEY</a>
      <p class="site-tagline">本地測試模式</p>
    </div>
  </header>

  <!-- 未選資料夾時的畫面 -->
  <div class="pick-screen" id="pickScreen">
    <p>選取一個裝有圖片的資料夾開始測試</p>
    <button class="btn-pick" id="pickBtn">選取圖片資料夾</button>
    <p>支援 JPG · PNG · WEBP · GIF</p>
  </div>

  <!-- 已選資料夾後顯示 -->
  <button class="btn-repick hidden" id="repickBtn">換資料夾</button>

  <main class="gallery-grid hidden" id="galleryGrid"></main>

  <!-- 燈箱 -->
  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog">
    <div class="lightbox-overlay" id="lightboxOverlay"></div>
    <div class="lightbox-panel">
      <button class="lightbox-close" id="lightboxClose">&#10005;</button>
      <div class="lightbox-media-wrap">
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
      </div>
      <div class="lightbox-info">
        <h2 class="lightbox-title" id="lightboxTitle"></h2>
        <blockquote class="lightbox-quote" id="lightboxQuote">（測試模式）</blockquote>
        <p class="lightbox-concept" id="lightboxConcept"></p>
        <div class="lightbox-meta">
          <button class="like-btn" id="likeBtn">
            <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="like-count" id="likeCount">0</span>
          </button>
          <div class="view-count">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <span id="viewCount">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 隱藏的 file input（資料夾選取，相容所有瀏覽器） -->
  <input type="file" id="folderInput" webkitdirectory multiple accept="image/*" style="display:none">

  <script>
    const pickScreen  = document.getElementById("pickScreen");
    const pickBtn     = document.getElementById("pickBtn");
    const repickBtn   = document.getElementById("repickBtn");
    const folderInput = document.getElementById("folderInput");
    const grid        = document.getElementById("galleryGrid");
    const lightbox    = document.getElementById("lightbox");
    const overlay     = document.getElementById("lightboxOverlay");
    const closeBtn    = document.getElementById("lightboxClose");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxTitle   = document.getElementById("lightboxTitle");
    const lightboxQuote   = document.getElementById("lightboxQuote");
    const lightboxConcept = document.getElementById("lightboxConcept");
    const likeBtn   = document.getElementById("likeBtn");
    const likeCount = document.getElementById("likeCount");
    const viewCount = document.getElementById("viewCount");

    pickBtn.addEventListener("click",   () => folderInput.click());
    repickBtn.addEventListener("click", () => folderInput.click());

    folderInput.addEventListener("change", () => {
      const files = Array.from(folderInput.files)
        .filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f.name))
        .sort((a, b) => a.name.localeCompare(b.name));

      if (!files.length) { alert("資料夾內沒有圖片檔案"); return; }

      pickScreen.classList.add("hidden");
      repickBtn.classList.remove("hidden");
      renderFiles(files);
    });

    async function renderFiles(files) {
      // 釋放舊的 object URL
      Array.from(grid.querySelectorAll("img")).forEach(img => {
        if (img.src.startsWith("blob:")) URL.revokeObjectURL(img.src);
      });
      grid.innerHTML = "";
      grid.classList.remove("hidden");

      for (let i = 0; i < files.length; i++) {
        const file  = files[i];
        const title = file.name.replace(/\.[^.]+$/, ""); // 檔名去掉副檔名當標題
        const url   = URL.createObjectURL(file);
        const orientation = await detectOrientation(url);

        const card = buildCard({ title, mediaUrl: url, orientation, likes: 0, views: 0 }, i);
        grid.appendChild(card);
      }
    }

    function detectOrientation(url) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload  = () => resolve(img.naturalWidth >= img.naturalHeight ? "landscape" : "portrait");
        img.onerror = () => resolve("landscape");
        img.src = url;
      });
    }

    function buildCard(data, index) {
      const card = document.createElement("article");
      card.className = `gallery-card ${data.orientation}`;

      const tx  = Math.round(Math.random() * 700 - 350);
      const ty  = Math.round(Math.random() * 500 - 250);
      const rot = (Math.random() * 22 - 11).toFixed(1);
      card.style.setProperty("--tx", tx + "px");
      card.style.setProperty("--ty", ty + "px");
      card.style.setProperty("--rot", rot + "deg");
      card.style.setProperty("animation-delay", (index * 65) + "ms");

      const img = document.createElement("img");
      img.src     = data.mediaUrl;
      img.alt     = data.title;
      img.loading = "lazy";
      card.appendChild(img);

      card.insertAdjacentHTML("beforeend", `
        <div class="card-overlay">
          <p class="card-title">${data.title}</p>
          <div class="card-meta-row">
            <span>♡ ${data.likes}</span>
            <span>👁 ${data.views}</span>
          </div>
        </div>
      `);

      card.addEventListener("click", () => {
        lightboxTitle.textContent   = data.title;
        lightboxQuote.textContent   = "（測試模式 — 這裡會顯示 Ashley 的話）";
        lightboxConcept.textContent = "";
        likeCount.textContent       = data.likes;
        viewCount.textContent       = data.views;
        lightboxImg.src = data.mediaUrl;
        lightboxImg.alt = data.title;
        likeBtn.classList.remove("liked");
        lightbox.classList.add("active");
        document.body.style.overflow = "hidden";
      });

      return card;
    }

    function closeLightbox() {
      lightbox.classList.remove("active");
      document.body.style.overflow = "";
    }

    closeBtn.addEventListener("click",  closeLightbox);
    overlay.addEventListener("click",   closeLightbox);
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
    likeBtn.addEventListener("click",   () => likeBtn.classList.toggle("liked"));
  </script>
</body>
</html>
